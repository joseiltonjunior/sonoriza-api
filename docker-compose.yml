version: "3.8"

networks:
  app-tier:
    driver: bridge

services:
  postgres:
    image: bitnami/postgresql:latest
    container_name: sonoriza-postgres
    restart: unless-stopped
    networks:
      - app-tier
    environment:
      - POSTGRESQL_USERNAME=sonoriza
      - POSTGRESQL_PASSWORD=sonoriza
      - POSTGRESQL_DATABASE=sonoriza
      - POSTGRESQL_ALLOW_REMOTE_CONNECTIONS=yes
      - POSTGRESQL_TIMEZONE=America/Sao_Paulo
      - POSTGRESQL_MAX_CONNECTIONS=200
      - POSTGRESQL_SHARED_PRELOAD_LIBRARIES=
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/bitnami/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonoriza -d sonoriza -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: